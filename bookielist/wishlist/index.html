<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookielist Wunschliste</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bookie-ink: #2f2622;
            --bookie-muted: #6f6259;
            --bookie-cream: #f7f0e4;
            --bookie-paper: #fff9f0;
            --bookie-accent: #b76745;
            --bookie-accent-soft: #d89573;
            --bookie-sage: #78907b;
            --bookie-border: #d9c6ad;
            --bookie-shadow: 0 14px 34px rgba(60, 39, 19, 0.14);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Nunito Sans", "Segoe UI", sans-serif;
            color: var(--bookie-ink);
            background:
                radial-gradient(circle at 15% -10%, rgba(216, 149, 115, 0.26), transparent 34%),
                radial-gradient(circle at 88% 0%, rgba(120, 144, 123, 0.22), transparent 28%),
                repeating-linear-gradient(
                    -8deg,
                    rgba(255, 255, 255, 0.62) 0px,
                    rgba(255, 255, 255, 0.62) 2px,
                    rgba(246, 234, 216, 0.9) 2px,
                    rgba(246, 234, 216, 0.9) 26px
                ),
                var(--bookie-cream);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3 {
            font-family: "Fraunces", "Times New Roman", serif;
            letter-spacing: 0.02em;
            margin: 0;
        }

        p, a {
            line-height: 1.62;
        }

        .bookie-home-pill {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 50;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 48px;
            padding: 10px 18px;
            border-radius: 999px;
            border: 1px solid rgba(47, 38, 34, 0.2);
            background: rgba(255, 249, 240, 0.86);
            color: var(--bookie-ink);
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 0.03em;
            font-size: 0.9rem;
            box-shadow: 0 6px 14px rgba(60, 39, 19, 0.14);
            backdrop-filter: blur(4px);
            transition: transform 0.24s ease, box-shadow 0.24s ease;
        }

        .bookie-home-pill:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(60, 39, 19, 0.2);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            width: 100%;
        }

        .banner {
            width: 100%;
            max-width: 600px;
            margin: 0 auto 1.5rem;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: var(--bookie-shadow);
        }

        .banner img {
            width: 100%;
            display: block;
        }

        header {
            text-align: center;
            padding: 1.5rem 0 2rem;
        }

        header h1 {
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--bookie-ink);
            margin-bottom: 0.4rem;
        }

        header p {
            font-size: 1.05rem;
            color: var(--bookie-muted);
            font-weight: 400;
        }

        .book-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .book-card {
            background: var(--bookie-paper);
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 2px 12px rgba(60, 39, 19, 0.06);
            border: 1px solid var(--bookie-border);
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .book-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(60, 39, 19, 0.1);
        }

        .book-number {
            font-family: "Fraunces", serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--bookie-accent-soft);
            min-width: 2rem;
            text-align: center;
        }

        .book-info {
            flex: 1;
            min-width: 0;
        }

        .book-title {
            font-family: "Fraunces", serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--bookie-ink);
            margin-bottom: 0.25rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .book-author {
            font-size: 0.9rem;
            color: var(--bookie-muted);
            margin-bottom: 0.15rem;
        }

        .book-isbn {
            font-size: 0.8rem;
            color: var(--bookie-muted);
            font-family: monospace;
            opacity: 0.8;
        }

        .buy-button {
            background: var(--bookie-accent);
            color: #fff;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .buy-button:hover {
            background: var(--bookie-accent-soft);
            transform: translateY(-1px);
        }

        .footer {
            margin-top: auto;
            background: rgba(255, 249, 240, 0.72);
            border-top: 1px solid var(--bookie-border);
            padding: 2.5rem 1.5rem;
            text-align: center;
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer h2 {
            font-size: 1.4rem;
            color: var(--bookie-ink);
            margin-bottom: 0.5rem;
        }

        .footer p {
            color: var(--bookie-muted);
            font-size: 0.95rem;
            margin-bottom: 1.25rem;
        }

        .playstore-button {
            display: inline-block;
            background: var(--bookie-accent);
            color: #fff;
            text-decoration: none;
            padding: 0.85rem 1.75rem;
            border-radius: 999px;
            font-weight: 700;
            font-size: 0.95rem;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .playstore-button:hover {
            background: var(--bookie-accent-soft);
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            color: var(--bookie-ink);
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: var(--bookie-muted);
        }

        .error-state {
            text-align: center;
            padding: 4rem 1rem;
        }

        .error-state h2 {
            font-size: 1.5rem;
            color: #B85450;
            margin-bottom: 0.5rem;
        }

        .error-state p {
            color: var(--bookie-muted);
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.9rem;
            }

            .book-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .buy-button {
                align-self: stretch;
                text-align: center;
            }

            .banner {
                border-radius: 12px;
            }
        }
    </style>
</head>
<body>
    <a href="../index.html" class="bookie-home-pill" aria-label="Zurück zu Bookielist">Roll &amp; Render</a>

    <script>
    function base64UrlDecodeToUtf8(base64) {
        var binary = atob(base64.replace(/-/g, '+').replace(/_/g, '/'));
        var bytes = new Uint8Array(binary.length);
        for (var i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
        }
        return new TextDecoder('utf-8').decode(bytes);
    }
    </script>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var mode = params.get('mode');
        var data = params.get('data');
        if (mode === 'redirect' && data) {
            try {
                var jsonString = base64UrlDecodeToUtf8(data);
                var books = JSON.parse(jsonString);
                var isbn = '';
                if (Array.isArray(books) && books.length > 0) {
                    isbn = books[0].isbn || '';
                } else if (books && books.isbn) {
                    isbn = books.isbn;
                }
                if (isbn) {
                    window.location.replace('https://www.thalia.de/suche?sq=' + encodeURIComponent(isbn));
                }
            } catch (e) {}
        }
    })();
    </script>
    <div class="container">
        <div class="banner">
            <img src="../images/Bookielist_Banner.jpg" alt="Bookielist Banner">
        </div>
        <header>
            <h1>Wunschliste</h1>
            <p id="subtitle">Geteilt mit Bookielist</p>
        </header>
        <div id="content"></div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <h2>Erstelle deine eigene Wunschliste</h2>
            <p>Organisiere deine Bücher, behalte den Überblick und teile deine Wunschliste mit Freunden — kostenlos.</p>
            <a href="https://play.google.com/store/apps/details?id=com.rollandrender.bookscanner" class="playstore-button" target="_blank" rel="noopener">Jetzt im Play Store</a>
            <div class="footer-legal" style="margin-top: 1.5rem; display: flex; gap: 1.25rem; justify-content: center; flex-wrap: wrap;">
                <a href="../datenschutz.html" style="color: var(--bookie-muted); text-decoration: none; font-size: 0.85rem; transition: color 0.2s ease;">Datenschutz</a>
                <a href="../../impressum.html" style="color: var(--bookie-muted); text-decoration: none; font-size: 0.85rem; transition: color 0.2s ease;">Impressum</a>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            const mode = params.get('mode');
            const content = document.getElementById('content');
            const subtitle = document.getElementById('subtitle');

            if (!data) {
                content.innerHTML = `
                    <div class="empty-state">
                        <h2>Keine Wunschliste geladen</h2>
                        <p>Öffne diese Seite über einen geteilten Link aus der Bookielist-App.</p>
                    </div>
                `;
                return;
            }

            try {
                const jsonString = base64UrlDecodeToUtf8(data);
                const books = JSON.parse(jsonString);

                if (!Array.isArray(books)) {
                    books = [books];
                }

                if (books.length === 0) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <h2>Wunschliste ist leer</h2>
                            <p>Diese Wunschliste enthält keine Bücher.</p>
                        </div>
                    `;
                    return;
                }

                subtitle.textContent = books.length + ' Buch' + (books.length !== 1 ? 'er' : '') + ' auf der Wunschliste';

                let html = '<div class="book-list">';
                books.forEach((book, index) => {
                    const isbn = book.isbn || '';
                    const thaliaUrl = isbn
                        ? 'https://www.thalia.de/suche?sq=' + encodeURIComponent(isbn)
                        : '#';
                    html += `
                        <div class="book-card">
                            <div class="book-number">${index + 1}</div>
                            <div class="book-info">
                                <div class="book-title">${escapeHtml(book.title || 'Unbekannt')}</div>
                                <div class="book-author">${escapeHtml(book.author || '')}</div>
                                ${isbn ? '<div class="book-isbn">ISBN: ' + escapeHtml(isbn) + '</div>' : ''}
                            </div>
                            ${isbn ? '<a href="' + thaliaUrl + '" class="buy-button" target="_blank" rel="noopener">Bei Thalia kaufen</a>' : ''}
                        </div>
                    `;
                });
                html += '</div>';
                content.innerHTML = html;
            } catch (e) {
                content.innerHTML = `
                    <div class="error-state">
                        <h2>Ungültiger Link</h2>
                        <p>Die Wunschliste konnte nicht geladen werden. Der Link ist möglicherweise beschädigt.</p>
                    </div>
                `;
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        })();
    </script>
</body>
</html>
