<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookielist Wunschliste</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #FAF7F2;
            color: #3D352E;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            width: 100%;
        }

        header {
            text-align: center;
            padding: 3rem 0 2rem;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #2C2420;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.1rem;
            color: #7A6F65;
            font-weight: 300;
        }

        .book-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .book-card {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 1.25rem 1.5rem;
            box-shadow: 0 2px 12px rgba(60, 50, 40, 0.06);
            border: 1px solid #E8DFD0;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .book-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(60, 50, 40, 0.1);
        }

        .book-number {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            color: #C4A882;
            min-width: 2rem;
            text-align: center;
        }

        .book-info {
            flex: 1;
            min-width: 0;
        }

        .book-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.15rem;
            font-weight: 600;
            color: #2C2420;
            margin-bottom: 0.25rem;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .book-author {
            font-size: 0.9rem;
            color: #7A6F65;
            margin-bottom: 0.15rem;
        }

        .book-isbn {
            font-size: 0.8rem;
            color: #A89F93;
            font-family: monospace;
        }

        .buy-button {
            background: #2C2420;
            color: #FAF7F2;
            text-decoration: none;
            padding: 0.6rem 1.2rem;
            border-radius: 999px;
            font-size: 0.85rem;
            font-weight: 500;
            white-space: nowrap;
            transition: background 0.2s ease;
        }

        .buy-button:hover {
            background: #4A3F35;
        }

        .footer {
            margin-top: auto;
            background: #F0EBE3;
            padding: 2.5rem 1.5rem;
            text-align: center;
        }

        .footer-content {
            max-width: 600px;
            margin: 0 auto;
        }

        .footer h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: #2C2420;
            margin-bottom: 0.5rem;
        }

        .footer p {
            color: #7A6F65;
            font-size: 0.95rem;
            margin-bottom: 1.25rem;
        }

        .playstore-button {
            display: inline-block;
            background: #2C2420;
            color: #FAF7F2;
            text-decoration: none;
            padding: 0.85rem 1.75rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: background 0.2s ease;
        }

        .playstore-button:hover {
            background: #4A3F35;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 1rem;
        }

        .empty-state h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #2C2420;
            margin-bottom: 0.5rem;
        }

        .empty-state p {
            color: #7A6F65;
        }

        .error-state {
            text-align: center;
            padding: 4rem 1rem;
        }

        .error-state h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #B85450;
            margin-bottom: 0.5rem;
        }

        .error-state p {
            color: #7A6F65;
        }

        @media (max-width: 480px) {
            header h1 {
                font-size: 1.9rem;
            }

            .book-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .buy-button {
                align-self: stretch;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <script>
    (function() {
        var params = new URLSearchParams(window.location.search);
        var mode = params.get('mode');
        var data = params.get('data');
        if (mode === 'redirect' && data) {
            try {
                var jsonString = atob(data.replace(/-/g, '+').replace(/_/g, '/'));
                var books = JSON.parse(jsonString);
                var isbn = '';
                if (Array.isArray(books) && books.length > 0) {
                    isbn = books[0].isbn || '';
                } else if (books && books.isbn) {
                    isbn = books.isbn;
                }
                if (isbn) {
                    window.location.replace('https://www.thalia.de/suche?sq=' + encodeURIComponent(isbn));
                }
            } catch (e) {}
        }
    })();
    </script>
    <div class="container">
        <header>
            <h1>Wunschliste</h1>
            <p id="subtitle">Geteilt mit Bookielist</p>
        </header>
        <div id="content"></div>
    </div>

    <div class="footer">
        <div class="footer-content">
            <h2>Erstelle deine eigene Wunschliste</h2>
            <p>Organisiere deine Bücher, behalte den Überblick und teile deine Wunschliste mit Freunden — kostenlos.</p>
            <a href="https://play.google.com/store/apps/details?id=com.rollandrender.bookscanner" class="playstore-button" target="_blank" rel="noopener">Jetzt im Play Store</a>
        </div>
    </div>

    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const data = params.get('data');
            const mode = params.get('mode');
            const content = document.getElementById('content');
            const subtitle = document.getElementById('subtitle');

            if (!data) {
                content.innerHTML = `
                    <div class="empty-state">
                        <h2>Keine Wunschliste geladen</h2>
                        <p>Öffne diese Seite über einen geteilten Link aus der Bookielist-App.</p>
                    </div>
                `;
                return;
            }

            try {
                const jsonString = atob(data.replace(/-/g, '+').replace(/_/g, '/'));
                const books = JSON.parse(jsonString);

                if (!Array.isArray(books)) {
                    books = [books];
                }

                if (books.length === 0) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <h2>Wunschliste ist leer</h2>
                            <p>Diese Wunschliste enthält keine Bücher.</p>
                        </div>
                    `;
                    return;
                }

                subtitle.textContent = books.length + ' Buch' + (books.length !== 1 ? 'er' : '') + ' auf der Wunschliste';

                let html = '<div class="book-list">';
                books.forEach((book, index) => {
                    const isbn = book.isbn || '';
                    const thaliaUrl = isbn
                        ? 'https://www.thalia.de/suche?sq=' + encodeURIComponent(isbn)
                        : '#';
                    html += `
                        <div class="book-card">
                            <div class="book-number">${index + 1}</div>
                            <div class="book-info">
                                <div class="book-title">${escapeHtml(book.title || 'Unbekannt')}</div>
                                <div class="book-author">${escapeHtml(book.author || '')}</div>
                                ${isbn ? '<div class="book-isbn">ISBN: ' + escapeHtml(isbn) + '</div>' : ''}
                            </div>
                            ${isbn ? '<a href="' + thaliaUrl + '" class="buy-button" target="_blank" rel="noopener">Bei Thalia kaufen</a>' : ''}
                        </div>
                    `;
                });
                html += '</div>';
                content.innerHTML = html;
            } catch (e) {
                content.innerHTML = `
                    <div class="error-state">
                        <h2>Ungültiger Link</h2>
                        <p>Die Wunschliste konnte nicht geladen werden. Der Link ist möglicherweise beschädigt.</p>
                    </div>
                `;
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        })();
    </script>
</body>
</html>
