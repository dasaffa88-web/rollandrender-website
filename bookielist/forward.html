<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Weiterleitung...</title>
    <script>
        (function() {
            const params = new URLSearchParams(window.location.search);
            const isbn = params.get('isbn');
            if (isbn) {
                const thaliaUrl = 'https://www.thalia.de/suche?searchString=' + encodeURIComponent(isbn);
                const awinUrl = 'https://www.awin1.com/awclick.php?mid=14158&id=2925911&p=' + encodeURIComponent(thaliaUrl);
                window.location.replace(awinUrl);
            } else {
                document.body.textContent = 'Fehlende ISBN.';
            }
        })();
    </script>
</head>
<body>
    Weiterleitung wird vorbereitet...
</body>
</html>
